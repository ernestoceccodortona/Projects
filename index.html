<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LinkCloud | Istantaneo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside>
            <h3>Progetti</h3>
            <nav id="project-list"></nav>
            <button class="add-project-btn" onclick="addProject()">+ Nuovo Progetto</button>
        </aside>

        <main>
            <header>
                <h1 id="current-project-title">Seleziona un progetto</h1>
                <button id="del-project-btn" class="danger-btn" style="display:none;">Elimina Progetto</button>
            </header>

            <div id="links-container" class="grid"></div>

            <section id="creator-tool" class="creator-panel" style="display:none;">
                <h4>Crea Nuovo Asset</h4>
                <div class="input-row">
                    <input type="text" id="asset-name" placeholder="Nome del file (es. Budget 2026)">
                    <input type="text" id="service-search" placeholder="Cerca servizio (es. Google, Figma...)" oninput="dynamicSearch()">
                </div>
                <div id="search-results" class="search-suggestions"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
