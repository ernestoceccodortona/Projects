<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkCloud | Workspace Operativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside>
            <div class="sidebar-header">
                <h3>LinkCloud</h3>
            </div>
            <nav id="project-list"></nav>
            <button class="add-project-btn" onclick="addProject()">+ Nuovo Progetto</button>
        </aside>

        <main>
            <header class="main-header">
                <h1 id="current-project-title">Seleziona un progetto</h1>
                <button id="del-project-btn" class="danger-btn" style="display:none;">Elimina Progetto</button>
            </header>

            <div id="links-container" class="grid"></div>

            <section id="creator-tool" class="creator-panel" style="display:none;">
                <h4>Aggiungi un Documento/Link</h4>
                <div class="step">
                    <input type="text" id="service-search" placeholder="1. Cerca servizio (es. Google, Figma, Slack...)" oninput="dynamicSearch()">
                    <div id="search-results" class="search-suggestions"></div>
                </div>

                <div id="url-input-zone" style="display:none; margin-top:20px;">
                    <div id="selected-service-info"></div>
                    <div class="input-group">
                        <input type="text" id="link-title" placeholder="Nome del file (es. Mockup Home)">
                        <input type="text" id="manual-url" placeholder="Incolla URL del file (https://...)">
                        <button onclick="confirmAddLink()" class="save-btn">Salva Link</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
