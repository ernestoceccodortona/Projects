<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LinkCloud | Workspace Operativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside>
            <div class="sidebar-header"><h3>LinkCloud</h3></div>
            <nav id="project-list"></nav>
            <button class="add-btn" onclick="addProject()">+ Nuovo Progetto</button>
        </aside>

        <main>
            <header class="main-header">
                <h1 id="current-project-title">Seleziona un progetto</h1>
                <button id="del-project-btn" class="danger-text" style="display:none;">Elimina Progetto</button>
            </header>

            <div id="links-container" class="grid"></div>

            <section id="creator-tool" class="creator-panel" style="display:none;">
                <div class="input-group">
                    <input type="text" id="asset-name" placeholder="Nome del documento (es. Logo V1)">
                    <input type="text" id="service-search" placeholder="Cerca servizio..." oninput="dynamicSearch()">
                </div>
                <div id="search-results" class="search-suggestions"></div>
            </section>
        </main>
    </div>

    <dialog id="url-dialog">
        <form method="dialog">
            <h3>Fissa il link del file</h3>
            <p>Incolla qui l'URL del file appena creato:</p>
            <input type="text" id="dialog-url-input" placeholder="https://...">
            <div class="dialog-actions">
                <button value="cancel" class="btn-secondary">Annulla</button>
                <button id="confirm-url-btn" type="button" class="btn-primary">Salva nel Progetto</button>
            </div>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
